<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Builder.io Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/styles.min.css" />
  <!-- Initialize Builder.io Web Components -->
  <script src="https://cdn.builder.io/js/webcomponents"></script>
</head>
<body class="page-services">
  <header class="site-header site-header-dark">
    <div class="container nav">
      <a class="logo" href="/" aria-label="Valiant Garage Door home">
        <img class="logo-shield" src="/assets/Valiant%20Shield%20Final.png" alt="Valiant shield" loading="eager" width="709" height="984" />
        <img class="logo-wordmark" src="/assets/logo/valiant-logo-gold.png" alt="Valiant Garage Door" loading="eager" width="1421" height="430" />
      </a>
      <nav id="site-nav" class="site-nav">
        <a href="/">Home</a>
        <a href="/services">Services</a>
        <a href="/gallery">Gallery</a>
      </nav>
    </div>
  </header>

  <main class="services-shell">
    <!-- This tag makes the entire area drag-and-drop editable -->
    <builder-component model="page" api-key="b2436361d20a48f2985dda1b54b0b953"></builder-component>
  </main>
  
  <script>
    // This allows the page to communicate with the Builder.io editor interface
    const builderComponent = document.querySelector('builder-component');
    builderComponent.addEventListener('load', () => {
      console.log('Builder content loaded for visual editing');
    });
  </script>
</body>
</html>
